services:
  db:
    container_name: oj_mysql
    image: mariadb:10
    restart: unless-stopped
    volumes:
      - ./database/:/var/lib/mysql/
    env_file: [environment/mysql.env, environment/mysql-admin.env]
    hostname: db
    networks: [db]
    # ports:
    # - 3306:3306
  redis:
    container_name: oj_redis
    image: redis:alpine
    restart: unless-stopped
    hostname: redis
    networks: [site]
    #ports:
    #  - 6379:6379
  base:
    build:
      context: .
      dockerfile: ./base/Dockerfile
    image: oj/oj-base
    network_mode: none
  site:
    container_name: oj_site
    build:
      context: .
      dockerfile: ./site/Dockerfile
    image: oj/oj-site
    init: true
    restart: unless-stopped
    volumes:
      - assets:/assets/
      - userdatacache:/userdatacache/
      - contestdatacache:/contestdatacache/
      - cache:/cache/
      - ./media/:/media/
      - ./problems/:/problems/
      - ./repo/:/site/
    working_dir: /site/
    env_file:
      [environment/mysql.env, environment/site.env, environment/email.env]
    hostname: site
    networks: [site, caddy, db]
    depends_on: [base, db, redis]
  celery:
    container_name: oj_celery
    build:
      context: .
      dockerfile: ./celery/Dockerfile
    image: oj/oj-celery
    init: true
    restart: unless-stopped
    volumes:
      - userdatacache:/userdatacache/
      - contestdatacache:/contestdatacache/
      - ./repo/:/site/
    working_dir: /site/
    env_file: [environment/mysql.env, environment/site.env]
    hostname: celery
    networks: [site, db]
    depends_on: [base, db, redis]
  bridged:
    container_name: oj_bridged
    build:
      context: .
      dockerfile: ./bridged/Dockerfile
    image: oj/oj-bridged
    init: true
    restart: unless-stopped
    volumes:
      - ./problems/:/problems/
      - ./repo/:/site/
    working_dir: /site/
    env_file: [environment/mysql.env, environment/site.env]
    hostname: bridged
    networks: [site, caddy, db]
    depends_on: [base, db, redis]
    ports:
      - "127.0.0.1:9999:9999"
      - "127.0.0.1:10000:10000"
  wsevent:
    container_name: oj_wsevent
    build:
      context: .
      dockerfile: ./wsevent/Dockerfile
    image: oj/oj-wsevent
    init: true
    restart: unless-stopped
    volumes:
      - ./repo/:/app/site/
    working_dir: /app/site
    env_file: [environment/mysql.env, environment/site.env]
    hostname: wsevent
    networks: [site, caddy]
    depends_on: [base]
    #ports:
    #  - 15100:15100
    #  - 15101:15101
    #  - 15102:15102
  caddy:
    container_name: oj_caddy
    build:
      context: .
      dockerfile: ./caddy/Dockerfile
    image: oj/oj-caddy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - assets:/assets/
      - userdatacache:/userdatacache/
      - contestdatacache:/contestdatacache/
      - cache:/cache/
      - ./media/:/media/
      - ./caddy/config:/etc/caddy/
      - caddy_data:/data
      - caddy_config:/config
    hostname: caddy
    networks: [caddy]
    depends_on: [site, wsevent]
networks:
  site:
  db:
  caddy:
volumes:
  assets:
  userdatacache:
  contestdatacache:
  cache:
  caddy_data:
  caddy_config:
